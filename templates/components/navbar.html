<!-- ==========================================================
     FILE: navbar.html

     PURPOSE
     ----------------------------------------------------------
     This file defines the navigation bar for the Mini Sports
     Analytics Dashboard.

     The navigation bar is shared across all pages
     using a Jinja include statement defined in
     base.html.

     Using reusable components avoids duplicating HTML code
     across multiple templates and makes the application
     easier to maintain.

     Students should learn:
     • Bootstrap Navigation Bar
     • Flask url_for()
     • Responsive navigation
     • Component-based web development

=========================================================== -->
